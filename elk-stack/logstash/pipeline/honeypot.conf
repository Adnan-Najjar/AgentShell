input {
  file {
    path => "/usr/share/logstash/logs/????-??-??_*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
}

filter {
  # Parse JSON from message field
  json {
    source => "message"
    remove_field => ["message"]
  }
  
  if [event] == "connection_open" {
    mutate { add_field => { "event_type" => "session_start" } }
  }
  else if [event] == "connection_close" {
    mutate { add_field => { "event_type" => "session_end" } }
  }
  else if [event] == "auth_attempt" {
    mutate { add_field => { "event_type" => "authentication" } }
  }
  else if [event] == "command" {
    mutate { add_field => { "event_type" => "command_execution" } }
  }
  else if [event] == "session_logout" {
    mutate { add_field => { "event_type" => "session_logout" } }
  }
  else if [event] == "keypress_ctrl" {
    mutate { add_field => { "event_type" => "keypress" } }
  }
  else if [event] == "pty_requested" {
    mutate { add_field => { "event_type" => "pty_request" } }
  }
  else if [event] == "shell_requested" {
    mutate { add_field => { "event_type" => "shell_start" } }
  }
  
  # GeoIP lookup for client_ip
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
  
  # Extract timestamp
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["172.19.0.10:9200"]
    index => "honeypot-%{+YYYY.MM.dd}"
  }
}
