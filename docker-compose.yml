services:
  app:
    container_name: app
    build: .
    environment:
      - BASE_URL=http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      honeypot-net:
        ipv4_address: 172.18.0.20
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs

  attacker-server:
    container_name: attacker-server
    hostname: attacker
    ports:
      - "2221:2221"
    expose:
      - "8080"
      - "15300"
    build: attacker-server/
    networks:
      honeypot-net:
        ipv4_address: 172.18.0.21

networks:
  honeypot-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
          gateway: 172.18.0.1
